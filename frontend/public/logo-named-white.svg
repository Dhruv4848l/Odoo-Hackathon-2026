    <path d="M16 2C8.27 2 2 8.27 2 16c0 7.73 6.27 14 14 14 0 0-5.5-5.5-5.5-14S16 2 16 2z" fill="#2EE08A" opacity="0.95" />
    
    <!-- Right Leaf (Social - Blue) -->
